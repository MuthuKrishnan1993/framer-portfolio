<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="roughen">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#roughen)">
    <circle cx="100" cy="100" r="70" fill="white" opacity="0.95"/>
    <ellipse cx="100" cy="100" rx="85" ry="60" fill="white" opacity="0.7"/>
    <ellipse cx="100" cy="100" rx="60" ry="80" fill="white" opacity="0.6"/>
    <circle cx="80" cy="80" r="40" fill="white" opacity="0.5"/>
    <circle cx="120" cy="120" r="40" fill="white" opacity="0.5"/>
    <circle cx="70" cy="110" r="30" fill="white" opacity="0.4"/>
    <circle cx="130" cy="85" r="30" fill="white" opacity="0.4"/>
  </g>
</svg>
